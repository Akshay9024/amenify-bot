services:
  - type: web
    name: amenify-support-bot
    runtime: python
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "from fastembed import TextEmbedding; TextEmbedding('sentence-transformers/all-MiniLM-L6-v2', cache_dir='.fastembed_cache')"
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.20
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
    plan: free
